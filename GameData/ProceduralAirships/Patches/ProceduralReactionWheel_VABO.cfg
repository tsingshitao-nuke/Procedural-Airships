// VAB Organizer category fix for Procedural Reaction Wheel
// Without this, VAB Organizer classifies it as "Wheels" because
// ModuleReactionWheel contains "wheel" in its name.

@PART[proceduralReactionWheel]:NEEDS[VABOrganizer]:FIRST
{
    %VABORGANIZER
    {
        %organizerSubcategory = reactionWheels
    }
}
