PART
{
    name = proceduralEnvelope
    module = Part
    author = tsingshitao
    	// --- asset parameters ---
	MODEL
	{
		model = ProceduralParts/Parts/cylinderTank
		scale = 1,1,1
	}
	scale = 1
	rescaleFactor = 1


    // ----- 编辑器分类 -----
    category = Aero
    subcategory = 0
    	// --- node definitions ---
	node_stack_top=0,0.5,0,0,1,0,1
	node_stack_bottom=0,-0.5,0,0,-1,0,1
	node_attach=0,0,0.5,0,0,-1,1


    title = #ProceduralAirship__1
    manufacturer = #ProceduralAirship__2
    description = #ProceduralAirship__3

    // ----- 科技与成本 -----
    TechRequired = start
    entryCost = 12000
    cost = 800
    mass = 0.5
    crashTolerance = 12
    breakingForce = 200
    breakingTorque = 200
    maxTemp = 2900
    tags = #ProceduralAirship__4

	attachRules = 1,1,1,1,0

    // ----- 程序化部件主模块 -----
    MODULE
    {
        name = ProceduralPart
        textureSet = PlainWhite
        costPerkL = 200

        diameterMin = 0.5
        diameterMax = 5.0
        lengthMin = 1.0
        lengthMax = 10.0
        volumeMin = 0.3
        volumeMax = 100.0

        UPGRADES
        {
            UPGRADE
            {
                name__ = ProceduralPartsTankUnlimited
                diameterMin = 0.01
                diameterMax = Infinity
                lengthMin = 0.01
                lengthMax = Infinity
                volumeMin = 0
                volumeMax = Infinity
            }
        }
    }
MODULE
{
    name = ProceduralShapeCylinder
    displayName = Cylinder
    techRequired = start
    length = 5.0
    diameter = 3.75
}
MODULE
{
    name = ProceduralShapeCone
    displayName = Cone
    techRequired = generalConstruction
    length = 5.0
    topDiameter = 2.5
    bottomDiameter = 3.75
}
MODULE
{
    name = ProceduralShapePill
    displayName = Pill
    techRequired = advConstruction
    length = 5.0
    diameter = 3.75
    fillet = 0.5
}
MODULE
{
    name = ProceduralShapeBezierCone
    displayName = Bezier Cone
    techRequired = advConstruction
    length = 5.0
    topDiameter = 2.5
    bottomDiameter = 3.75
}
MODULE
{
    name = ProceduralShapePolygon
    displayName = Polygon
    techRequired = start
    length = 5.0
    diameter = 3.75
}
MODULE
{
    name = ProceduralShapeHollowCylinder
    displayName = Hollow Cylinder
    techRequired = start
    length = 5.0
    innerDiameter = 1.875
    outerDiameter = 3.75
}
MODULE
{
    name = ProceduralShapeHollowCone
    displayName = Hollow Cone
    techRequired = start
    length = 5.0
    topInnerDiameter = 1.25
    topOuterDiameter = 2.5
    bottomInnerDiameter = 1.5
    bottomOuterDiameter = 3.75
}
MODULE
{
    name = ProceduralShapeHollowPill
    displayName = Hollow Fillet Cylinder
    techRequired = start
    length = 5.0
    innerDiameter = 1.875
    outerDiameter = 3.75
    fillet = 0.9375
}

    // ----- HL 气囊模块（初始值会被动态覆盖） -----
    MODULE
    {
        name = HLEnvelopePartModule
        envelopeVolume = 20.0
        envelopeVolumeScale = 1.0
        specificVolumeFractionEnvelope = 0.0
        compressRate = 0.05
        expandRate = 0.05
        minAtmPressure = -0.01
        makeStationarySpeedMax = 10
        makeStationarySpeedClamp = 0.05
        envelopeHasAnimation = false
    }

    // ----- 同步模块：将程序化体积映射到浮力 -----
    MODULE
    {
        name = ProceduralEnvelopeVolumeModule
        volumeScale = 20 
    }
}
